<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca | Iniciar Sesión</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .bg-library {
            background-image: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url('https://images.unsplash.com/photo-1524995997946-a1c2e315a42f?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
        }
        .card-shadow {
            box-shadow: 0 25px 40px -12px rgba(0, 0, 0, 0.3);
        }
        input {
            transition: all 0.2s ease;
        }
        input:focus {
            transform: translateY(-2px);
        }
    </style>
</head>
<body class="bg-library min-h-screen flex items-center justify-center p-4">
    <div class="bg-white/95 backdrop-blur-sm rounded-2xl shadow-2xl w-full max-w-md p-8 card-shadow border border-amber-200">
        <div class="text-center mb-6">
            <div class="inline-block p-3 bg-amber-100 rounded-full mb-3">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-amber-700" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                </svg>
            </div>
            <h1 class="text-3xl font-bold text-gray-800">📖 Biblioteca</h1>
            <p class="text-gray-600 mt-1">Accede a tu cuenta</p>
        </div>

        <div id="error" class="hidden bg-red-50 border-l-4 border-red-500 text-red-700 p-3 rounded-lg mb-5 text-sm flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd" />
            </svg>
            <span id="errorMsg"></span>
        </div>

        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Correo electrónico</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <svg class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207" />
                        </svg>
                    </div>
                    <input type="text" id="email" placeholder="tu@email.com" class="w-full pl-10 pr-3 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-amber-400 focus:border-transparent outline-none transition">
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <svg class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6-4h12a2 2 0 012 2v6a2 2 0 01-2 2H6a2 2 0 01-2-2v-6a2 2 0 012-2zm10-4V8a4 4 0 00-8 0v3h8z" />
                        </svg>
                    </div>
                    <input type="password" id="password" placeholder="••••••••" class="w-full pl-10 pr-3 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-amber-400 focus:border-transparent outline-none transition">
                </div>
            </div>
            <button onclick="login()" class="w-full bg-amber-700 hover:bg-amber-800 text-white font-semibold py-3 rounded-lg transition duration-200 shadow-md hover:shadow-lg transform hover:-translate-y-0.5">
                Ingresar
            </button>
        </div>

        <div class="mt-6 p-3 bg-amber-50 rounded-lg border border-amber-200 text-center text-sm text-amber-800">
            <span class="font-medium">🔑 Credenciales de prueba</span><br>
            <span>📧 betty.admin@library.com</span> | <span>🔒 Admin2024!</span><br>
            <span>📧 carlos.lector@gmail.com</span> | <span>🔒 Carlos789*</span><br>
            <span>📧 kevin.kids@library.com</span> | <span>🔒 Cuentos123</span>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        // Extiende la función login para almacenar también el ID del usuario
        async function login() {
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value;
            const errorDiv = document.getElementById("error");
            const errorMsg = document.getElementById("errorMsg");

            if (!email || !password) {
                errorMsg.textContent = "Por favor, completa todos los campos";
                errorDiv.classList.remove("hidden");
                return;
            }

            try {
                const res = await fetch("http://127.0.0.1:8000/auth/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/x-www-form-urlencoded" },
                    body: new URLSearchParams({ username: email, password: password })
                });
                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem("token", data.access_token);
                    localStorage.setItem("role", data.role);
                    // Obtener el ID del usuario desde /auth/me usando el token
                    const userRes = await fetch("http://127.0.0.1:8000/auth/me", {
                        headers: { "Authorization": `Bearer ${data.access_token}` }
                    });
                    if (userRes.ok) {
                        const userData = await userRes.json();
                        localStorage.setItem("userId", userData.Id);
                    }
                    window.location.href = "dashboard.html";
                } else {
                    errorMsg.textContent = data.detail || "Credenciales incorrectas";
                    errorDiv.classList.remove("hidden");
                }
            } catch (err) {
                errorMsg.textContent = "Error: El servidor FastAPI no responde (puerto 8000)";
                errorDiv.classList.remove("hidden");
            }
        }
    </script>
</body>
</html>
